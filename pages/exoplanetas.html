<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exoplanetas</title>
  <style>
    body {
      background-color: #000;
      color: #fff;
    }

    h2 {
      color: #fff !important;
    }

    p {
      color: #e0e0e0 !important;
    }

    @keyframes flutuacao {

      0%,
      100% {
        transform: translateX(0px);
      }

      50% {
        transform: translateX(15px);
      }
    }

    #exo img {
      animation: flutuacao 5s ease-in-out infinite;
    }
  </style>
</head>

<body>
  <header class="header-bg header-button-up">
    <nav class="header container">
      <button data-menu="button" aria-expanded="false" aria-controls="menu">Menu</button>
      <div>
        <h2 class="cor-0 font-1-l-b">Sistema <span class="cor-4">Solar</span></h2>
      </div>
      <ul class="header-menu font-1-s" data-menu="list" id="menu">
        <li><a href="../sistema-solar/pages/exoplanetas.html">Exoplanetas</a></li>
        <li><a href="./">Planetas Rochosos</a></li>
        <li><a href="./">Principais Luas</a></li>
        <li><a href="./">O Sol</a></li>
        <li><a href="./">Curiosidades</a></li>
      </ul>
    </nav>
  </header>

  <main class="introducao">
    <article id="exoplanetasContainer">
      <!-- Os exoplanetas serão inseridos aqui pelo JavaScript -->
    </article>
    <button><a href="../index.html">Voltar</a></button>
  </main>

  <script type="module">
    async function carregarExoplanetas() {
      try {
        const response = await fetch('../exoplanetas-dados/exoplanetas.json');
        const exoplanetas = await response.json();
        const container = document.getElementById('exoplanetasContainer');

        exoplanetas.forEach((exoplaneta) => {
          const div = document.createElement('div');
          div.className = 'exo';
          div.setAttribute('data-anime', 'scroll');
          div.setAttribute('data-tab', 'show-right');
          div.innerHTML = `
            <h2 class="cor-9 font-1-xxl">${exoplaneta.nome}</h2>
            <div id="exo">
              <img src="${exoplaneta.url}" width="300" alt="${exoplaneta.nome}">
            </div>
            <div class="exo-descricao">
              <p class="cor-10 font-1-m container">${exoplaneta.descricao}</p>
            </div>
          `;
          container.appendChild(div);
        });
      } catch (error) {
        console.error('Erro ao carregar exoplanetas:', error);
      }
    }

    carregarExoplanetas();
  </script>
</body>

</html>
